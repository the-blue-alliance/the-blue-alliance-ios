name: Release

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "What to build"
        required: true
        type: choice
        options:
          - TestFlight
          - App Store
        default: TestFlight
      confirm:
        description: "Retype the selection (TestFlight or App Store) to confirm"
        required: true
        type: string

jobs:
  release:
    name: Release (${{ inputs.lane }})
    runs-on: macos-latest
    if: ${{ inputs.confirm == inputs.lane && github.ref == 'refs/heads/main' }}
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-
      - name: Install
        run: |
          cp mock-Secrets.plist the-blue-alliance-ios/Secrets.plist
          bundle install
          bundle exec fastlane run setup_ci
          bundle exec fastlane setup_secrets
        env:
          TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
      - name: fastlane beta_ci
        if: ${{ inputs.lane == 'TestFlight' }}
        run: bundle exec fastlane beta_ci
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MATCH_GIT_REPO: ${{ secrets.MATCH_GIT_REPO }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          SLACK_URL: ${{ secrets.SLACK_URL }}
      - name: fastlane app_store
        if: ${{ inputs.lane == 'App Store' }}
        run: bundle exec fastlane app_store
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MATCH_GIT_REPO: ${{ secrets.MATCH_GIT_REPO }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          SLACK_URL: ${{ secrets.SLACK_URL }}
      - name: Archive dSYMs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dsyms-${{ inputs.lane == 'TestFlight' && 'testflight' || 'appstore' }}-${{ github.run_number }}
          path: |
            **/*.dSYM.zip
            **/*.dSYM
          if-no-files-found: warn
          retention-days: 90
