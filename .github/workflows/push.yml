name: On push

on:
  push:
    branches:
      - main

jobs:
  swift-format:
    name: swift-format
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint
        run: ./scripts/swift-format-lint.sh --strict

  test-publish:
    name: Test + Publish
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-
      - name: Install
        run: |
          cp mock-Secrets.plist the-blue-alliance-ios/Secrets.plist
          bundle install
          bundle exec fastlane run setup_ci
          bundle exec fastlane setup_secrets
        env:
          TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
      - name: fastlane build_ci
        if: ${{ !contains(github.event.head_commit.message, '[clowntown]') }}
        run: bundle exec fastlane build_ci
      - name: fastlane test
        if: ${{ !contains(github.event.head_commit.message, '[clowntown]') }}
        run: bundle exec fastlane test
